version: "3.8"

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: mysql-aiquality
    restart: always
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-aiquality}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - aiquality-network

  # Redis 缓存
  redis:
    image: redis:alpine
    container_name: redis-aiquality
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      interval: 10s
    networks:
      - aiquality-network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-aiquality
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - aiquality-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: minio-aiquality
    restart: always
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      timeout: 5s
      retries: 5
      interval: 10s
    networks:
      - aiquality-network

  # 后端应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-aiquality
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio
      # 使用内部网络中的 mysql 进行连接
      - DATABASE_URL=mysql://${DB_USER:-root}:${DB_PASSWORD:-123456}@mysql:3306/${DB_NAME:-aiquality}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiquality-network

  # 前端应用构建 (中间镜像)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-aiquality
    # 前端容器运行后会自动把构建好的静态文件复制到共享卷或由 Nginx 托管
    # 这里我们采用多阶段构建并直接让 Nginx 使用其构建产物

  # Nginx (前端入口 + 反向代理)
  nginx:
    image: nginx:alpine
    container_name: nginx-aiquality
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # 我们改用名为 frontend-build 的共享卷，由 frontend 容器生成，由 Nginx 消费
      # 或者为了简单，直接在 nginx 容器中使用 frontend 的构建产物。
      # 鉴于 frontend/Dockerfile 已经是一个 nginx 容器，我们直接使用该容器即可！
    depends_on:
      - backend
    build:
      context: .
      dockerfile: frontend/Dockerfile # 直接基于前端镜像，它已经自带了构建产物和 nginx 运行环境。
    networks:
      - aiquality-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  qdrant-storage:
    driver: local
  minio-data:
    driver: local

networks:
  aiquality-network:
    driver: bridge
